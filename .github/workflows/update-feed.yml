name: Update Malfini feed

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Checkout previous Pages snapshot
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: previous-pages

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Restore previous import history
        run: |
          mkdir -p data
          if [ -f previous-pages/data/feed-cache.json ]; then
            cp previous-pages/data/feed-cache.json data/feed-cache.json
          fi

      - name: Import latest Malfini feed
        env:
          MALFINI_USERNAME: ${{ secrets.MALFINI_USERNAME }}
          MALFINI_PASSWORD: ${{ secrets.MALFINI_PASSWORD }}
          MALFINI_API_BASE_URL: https://api.malfini.com
        run: node server.js --import

      - name: Prepare static Pages snapshot
        run: |
          mkdir -p public/data
          FEED_FILE="feed-cache-${GITHUB_RUN_ID}.json"
          cp data/feed-cache.json "public/data/${FEED_FILE}"
          cp data/feed-cache.json public/data/feed-cache.json
          printf '{"feedPath":"data/%s","runId":"%s"}\n' "${FEED_FILE}" "${GITHUB_RUN_ID}" > public/feed-version.json

      - name: Publish GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./public
          force_orphan: true
